body:
  text: 孝經問翰林院檢討毛竒齡撰張燧山隂人係張南士先生之子康熙庚辰進士問孝經孔子之書班氏漢書志云孔子為曾子傳孝道也但不知果夫子所授曾子所述且出於何時宋人極疑其為偽故朱元晦刪改之至元呉澄又刪改之得毋非聖經乎孝經本孔子之書觀孝經鉤命決曰孔子云欲觀我褒貶諸侯之志在春秋崇人倫之行在孝經此雖緯書然當時曾櫽括其語曰吾志在春秋行在孝經何休取其語以註春秋唐𤣥宗亦取其語以入孝經序此定無可疑者故漢魏六朝祖述此經者約有百家其間張禹孔光鄭𤣥王肅韋昭謝萬徐整袁宏荀昶殷仲文何承天輩亦皆有名字人豈無一人覺其偽如宋人者若宋人學問專以非聖毁經為能事即夫子手著春秋易大傳亦尚有訾謷之不已者何况孝經故凡斥尚書擯國風改大學刪孝經全無顧忌此固不足據也但舊謂孝經夫子所作以授曾子又謂夫子口授曾子俱無此事此仍是春秋戰國間七十子之徒所作稍後于論語而與大學中庸孔子閒居仲尼燕居坊記表記諸篇同時如出一手故每説一章必有引經數語以為證此篇定例也然而有今文又有古文且曰今文真而古文偽何也據漢藝文志孝經古孔氏一篇此古文也孔安國所傳者也孝經一篇即今文也長孫氏江翁翼奉后蒼所受者也但不敘今文所出之故惟古文則云武帝末魯共王壊孔子宅得古文尚書及禮記論語孝經皆古字也故曰古文及隋書經籍志始云孝經河間人顔芝所藏漢初芝子貞出之又有古文孝經與古文尚書同出孔安國為傳劉向以顔本比古文除其煩惑而安國之本亡于梁至隋秘書監王邵訪得孔傳河間劉炫因敘其得喪講于人間漸聞朝廷儒者皆云炫自作之非孔舊本其來歴不過如此予謂古今文原無二本古文尚書其與今文異者以增多五十八篇為今文所無有故異耳若兩家俱有則二十八篇並無一字有差殊也孝經亦然其異者祇古文增多一章二十四字今文無有其他則經文並同雖古文分為二十二章今文分為十八章猶之古文尚書分盤庚為三篇而今文只作一篇古文多閒字坐字參字子曰字今文多諸也字猶之古文尚書召誥脱幾字今文尚書酒誥多幾字古文女辟弟豈謹弗諸字今文作汝避悌愷慎不諸字猶之古文尚書嵎夷昧谷今文尚書作嵎䥫柳谷則意藝文志所云經文皆同惟孔氏壁中古文為異者非經文有異而古字異也劉向所謂古文字也又云父母生之續莫大焉故親生之膝下諸家説不安處古文字讀皆異者正指古文之字與讀也字異句讀亦異也若桓譚新論云古孝經千八百七十二字今異者四百餘字則呉澄刪孝經亦云古本一千八百零七字與譚所記不甚逺其少有贏縮或彼此差訛俱未可定至如異者四百餘字則斷是古字若經文祇千餘字而異者四百餘則别一孝經非古今文矣至謂古文為劉炫偽作則大不然據隋書劉炫劉焯在隋時最有名字炫左手畫方右手畫圓口誦目數五官並用所著經書最為浩博豈有刪數也字增子曰字以為偽者且刪數也字增子曰字有何得喪何足講論而云因敘其得喪講于人間據隋經籍志祕書監王邵訪得孔傳而河間劉炫為之敘講得毋炫所敘講者孔安國之註非經文乎炫本傳云内史送炫吏部炫自為狀曰周禮禮記毛詩尚書公羊左傳孝經論語孔鄭王何服杜等註凡十三家雖義有精粗並堪講授則其所講授者明云是尚書孝經之註供狀具在也且炫講孝經雖孔鄭並講而翻不遵孔而遵鄭講今文而不講古文何以知之孝治章云治家者不敢失於臣妾而况於妻子乎古文作不敢侮於臣妾乃正義引劉炫云失謂不得其意又云臣妾營事産業宜須得其心力故云不敢失也則炫所講者今文矣故予謂疑炫作偽必當時忌炫之言與古今文門户所藉口並非實録而明儒無學不知刪數也字增子曰字于經文何害而痛詬劉炫有如不共且有增改隋書偽造註疏以誅炫者保無人之不繙隋書註疏一閲之乎且欲攻人之偽而先自處于偽可乎且堂堂經文刪改移易至于十七通不之責而責此之乎者也數助詞之同異也乎呉澄謂古孝經二十二章魏晉以後不存劉炫以今文孝經分析庶人敢問章為三又增一章以足二十二章之數則似古文之偽以分章見者若明初王褘且曰孝經古無章次至漢始定次為十八章唐名其篇近復有定為經傳者則似古今文皆不宜分章矣且經傳之説創自朱熹不知是否朱熹呉澄皆刪改孝經而又各不同熹本古文以司馬光為史館檢討時曾進古文孝經故也澄本今文以疑古為偽故也但其疑古為偽處亦多未是如此疑分章亦知二十二章是古文舊分而但以分庶人敢問章為可疑殊不知西漢相傳早自如此顔師古註漢志云二十二章者劉向以為庶人章分為二曾子敢問章分為三又多一章凡二十二章則自班固作志劉向校經以前其所分之章與今並同並非隋代劉炫妄分此以足其數也若王文忠云古文無章次則又不然前見王草堂孝經彚刻引明孫本説亦云孝經起于仲尼居迄于孝子之事親終矣統為一篇並無章次亦不分經傳其云不分經傳良是若章次則凡書有之所云章句屬讀是也故古本大學舊雖一篇然有分大學之道至止於信為一章者有分至天下平為一章者而註疏則分章甚夥但其多寡異同總無闗輕重不足較辨耳若謂孝經止一篇則但見藝文志孝經古孔氏一篇孝經一篇而誤者彼所云一篇謂一卷也古孔氏一篇下註云二十二章孝經一篇下註云十八章此班氏自註者故註疏序云夫子説孝經一十八章正義云初除挟書律有河間人顔貞出其父芝所藏凡一十八章以相傳授又云魯恭王壊孔子宅得古文二十二章孔安國作傳至劉向校經籍比量二本除其煩惑以十八章為定而不列名其云十八章為定者謂二十八章似太煩惑故定以十八而不用二十二非謂劉向始分作十八也其云不列名者以唐𤣥宗集諸儒之議始于每章上列以名如開宗明義章第一類而當時未嘗列也唐𤣥宗本開宗明義章第一天子章第二諸侯章第三卿大夫章第四士章第五庶人章第六三才章第七孝治章第八聖治章第九紀孝行章第十五刑章第十一廣要道章第十二廣至徳章第十三廣揚名章第十四諫争章第十五感應章第十六事君章第十七喪親章第十八蓋舊本章上並無章名惟孝經援神契自天子至庶人五章上加以天子庶人之名第二天子章第三諸侯章第四卿大夫章第五士章第六庶人章凡五章而餘俱無有皇侃註孝經即以此五名加于章首而鄭氏註本後人亦遂有加此名者故唐宗下議使儒官連狀題其章名而採而用之今所稱開宗明義章者是也要之此皆不足置重輕者幾見無此名而孝經存有此名而孝經即已亡也獨是分之為經傳而刪削而移易之則萬萬無是理者古人無聖經賢傳之説道徳名經易繫名傳並是混稱惟鄭康成註毛詩有云小雅十六篇大雅十八篇謂之正經而孔氏正義即云凡書非正經者皆謂之傳是以仲長統有云周禮禮之經禮記禮之傳而呂東莱謂楚辭惟離騷為經而九辨以下皆可稱傳然亦不過偶然言之未嘗竟取而分之也而朱氏于大學于孝經于儀禮周禮禮記則直取而分之且即分之亦不必遽為刪改鄭氏未嘗刪二雅仲長氏未嘗改三禮也而朱氏則不止分之直取而刪之改之移易之古文二十二章二千零七字朱氏改作經一章傳十四章刪存一千五百九十五字今文十八章一千九百九十九字呉氏改作經一章傳十二章刪存一千五百八十二字其兩家各顛倒移置不可勝計註經者當如是乎二雅三禮非一人之書一時之言或經或傳尚可分劃大學孝經則一人之書一時之言也詩禮為時人所作未必果聖人之所授賢人之所受故稱經不為揚稱傳不為抑而大學則聖人授之孝經則賢人受之者也夫聖人所授賢人所受則但為區分未嘗改易猶為不可而况乎刪之改之移易之且從而詬厲之經七章云先王見教之可以化民也云云旣刪之矣且云温公改教為孝乃得粗通則不改者為精不通矣又云前叚文雖非是理猶可通則後叚文旣非是且于理為萬無可通者矣至其曰理之悖曰非天下之通訓徵色𤼵聲處處皆是聖言至此何止受侮孝經十四章云非聖人者無法大亂之道也不知此言通否盍亦起朱呉二氏問之曰聖言何可侮但其所刪改與其所詬厲處則原有可疑者經云夫孝天之經也地之義也民之行也天地之經而民是則之則天之明因地之義此數語與左傳昭二十五年子太叔論禮之文相同第以禮字易孝字且以甚哉禮之大也易孝之大也則似乎全襲左傳以為文者或者此非夫子之言故刪之因有微詞此不可謂大無理也如所言則何止于此第十二章云以順則逆民無則焉不在于善而皆在于凶徳此即左傳太史克曰以訓則昏民無則焉不度于善而皆在于凶徳言思可道行思可樂徳義可尊作事可法容止可觀進退可度以臨其民此即左傳北宫文子曰進退可度周旋可則容止可觀作事可法徳行可象以臨其下皆直用左氏文以為言而不少避者論語亦然克己復禮為仁則直用左傳古也有志克已復禮仁也出門如見大賔使民如承大祭則直用晉臼季曰出門如賔承事如祭仁之則也即彼哉彼哉用陽虎語不學禮無以立用孟僖子語不特記者如此即手自為文亦然贊易乾卦元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事則全襲魯穆姜曰元體之長也亨嘉之㑹也利義之和也貞事之幹也體仁足以長人嘉徳足以合禮利物足以和義貞固足以幹事此其文在襄九年夫子未生之前豈有穆姜襲夫子言者然而游夏見之不以為疑七十子之徒聞之不以為怪漢唐至今並無敢有一人焉起而刪之詬厲之若是者何也則以夫子之言原與春秋相表裏而非有二也春秋有簡書有䇿書夫子修簡書以為春秋之經左丘明修䇿書以為春秋之傳其二書皆朝夕講求行著習察師以之為教弟以之為學不問其為何人語而其言足述徃徃取之以垂訓蓋夫子平居口授原自如此故其自為文與門弟子所為文皆彼此一轍而並無嫌畏避忌于其間人苟有學則自多見少怪者已則無學而反謂聖經之有未通此在他人猶不可而况乎註經者也夫孝天之行也三句明出自左傳亦明知以禮字改孝字然以班固之學何書不讀豈不見左傳豈不知孝經之孝字即左傳之禮字而其作藝文志偏述孝經此語曰夫孝天之經地之義人之行也一若千古言孝惟此數語為必不可移易之金冊玉版並非他文可貿亂者則其尊此經為何如而可容睥睨之也然亦有可疑者夫孝本天地之經而民是則之故其教不肅而成其政不嚴而治是成教者孝之效也而曰先王見教之可以化民則其所云不肅而成不嚴而治者非孝之效而教之效矣故司馬光進孝經時改作孝字朱氏所云温公改教為孝是也然則刪之豈過乎聖人之言矢口成文無邊無幅非如近人陋腹可量其短長而齊其參錯中庸取人以身取人者修身之效也旣而曰思修身不可以不知人則取人又修身之功矣故此章初言孝繼言教而其言教則又雜出之以徳義敬讓禮樂好惡諸名與近人之腹不合亦思中庸初言人存繼言修身而其言修身則又雜出之以仁道義禮事親知人諸名向使齊其參錯而量其短長則中庸不可刪乎司馬光本無學之人觀其定濮議全不識禮凟亂千古今又改此字以啟後人改經之漸總是宋人習氣無足道者雖其改此字尚有可原以唐宗作序中有聖人知孝之可以教人也亦是孝字但彼是行文此是註經彼非述經語此則直換經字耳徃讀孝經有謂示之以好惡而民知禁好惡何指予妄應之曰好者孝惡者即不孝也既見邢疏而悔之古聖人之言彼此相仍並無杜撰然皆連類推及不分主客如此徳義敬讓禮樂好惡八字皆他經所有左傳趙衰薦郤縠云詩書義之府也禮樂徳之則也徳義利之本也此徳義之説也鄉飲酒義云先禮而後財則民作敬讓而不爭矣此敬讓不爭之説也樂記云先王之制禮樂也將以教民平好惡而反人道之正也好惡著則賢不肖别矣此禮樂民和好惡知禁之説也然而趙衰言詩書禮樂而及禮及好惡今言孝而必不使其及徳義禮樂敬讓好惡是取孩孺學八比之法以律聖經小人之腹也但朱氏語録謂論語言孝親切有味此不曾説得親切但言孝之效如此則似與論語不合故疑之耳論語親切者孟懿子武伯子游子夏皆就其所問而荅之故色養敬養祇就孝一節為言此則夫子教之以大道篇首明云至徳要道班固所云舉大者言是也且身體髪膚受之父母諸語在開首旣已親切明了即不敢惡于人不敢慢于人高而不危滿而不溢以至開天分地謹身節用次第而入又何一非親切行事亦何一是效推而至于孝治聖治郊祀配天宗祀明堂皆切實責備並非取驗朱氏凡于親切處皆認是效而于郊祀配天諸文則又疑其踰越僭妄有今將之心是孟子對咸丘䝉尚告之以大孝尊親以天下養之義而以吾道一貫之曾子乃僅僅以服勞奉養必有酒肉之小節呼而訓之豈曾氏之子反不若咸丘䝉哉然則朱氏遵古文呉氏遵今文有優劣乎其所刪者誰是誰非有差等乎且明儒極詬古文謂今文祖述約有百家而古文之學祇劉炫一人何謂也古今文無優劣今之文猶古之文也則遵者無優劣矣古今文俱不宜刪刪則刪是亦非刪非亦非也則刪者無差等矣若今文盛行而古文稍減則以今文之出在除挾書律時而孔壁古文至武帝末天漢之後與尚書論語並出其時相距約有百年且今文初出即有長孫氏江翁翼奉后蒼為之授受而古文則武帝命孔安國作傳以巫蠱事𤼵匿而不上故諸家皆出而孔傳獨後然而至隋唐之間諸家漸息惟孔傳鄭註兩家並行一古文一今文唐宗序所云劉炫明安國之本陸澄譏康成之註邢疏序所云劉子𤣥辨鄭註有十謬七惑司馬堅斥孔註多鄙俚不經專以二家為言可驗也若謂今文百家古文祇劉炫一人此出自明歸有光諸君所言有光極闢古文尚書而自處于謬劇不足辨今所言亦非是諸家無古今之分惟長孫江翁后蒼翼奉初為四家後增以張禹為五家若又稱六家則韋昭王肅虞翻劉邵劉炫陸澄六人合古今為言而劉炫之名已居然厠乎其間誰謂炫祇古文家乎但又有謂古文不如今文呉所刪勝于朱所刪者今文篇首祇云仲尼居曾子侍而古文增閒居侍坐二字呉澄謂居即坐也與上句義重禮小戴記云仲尼燕居子張子夏子游侍孔子閒居子夏侍大戴記云孔子閒居曾子侍並無坐字此經與彼所記當為一例且許慎説文所引孝經尚書皆自稱為古文今説文所引並無閒坐二字則此非古文偽乎非澄説之較勝于朱氏者乎古今文本無異同其所異者祇此閒坐二字然此則古文是而今文非者朱呉所刪俱不是然此則呉氏尤不是者古居皆有名如二戴記所稱仲尼燕居孔子閒居類各有處所故劉向别録中載鄭目録註云退朝而處曰燕居退燕避人曰閒居未有祇出居一字以記處所者字書居者處也但曰處知處在何所耶若侍則有待立待坐之分侍立曰侍側曰侍論語顔淵季路侍閔子侍側是也侍坐者必曰侍坐論語子路曾晳冉有公西華侍坐是也葢侍立在正席之側請業必膝于席端請畢卽起故孔子閒居子夏侍此侍立者立則膝席問業問畢便起起者起立也故曰子夏蹶然而起負牆而立侍坐在正席之前之側曲禮所謂席間函丈者東西設席而坐于席間請業則起跪請畢還坐故曰侍坐于先生請業則起請益則起起者起跪也而至于避席則不止起跪而反越席而起立以致敬故哀公問篇初祇稱哀公問于孔子曰此侍立也旣而坐則特稱孔子侍坐于哀公然後稱孔子蹴然辟席而對此明明者今儼有曾子辟席有復坐語則非侍立而侍坐矣侍坐可無坐字乎且澄但知居字可解坐字而不知居是居坐是坐孟子居鄒子思居于衛皆作居處解即燕居閒居皆是處不是坐曲禮曰居不主奥坐不中席明明以居字坐字彼此各出而乃曰居坐義重則曲禮尚未讀而欲改古經不可也若謂許慎説文無閒坐二字則尤可笑者慎于和帝時襲賈逵字學以作説文逵自稱受古文尚書而其所受者實東漢初杜林偽造古文漆書之學並非孔氏壁中本故説文所引亦自稱古文而于五十八篇之文並無一字予于古文尚書寃詞卷已載之詳矣至孝經則説文序亦云慎又學孝經孔氏古文説其書皆建武時給事中議郎衛宏所授則宏是杜林弟子正漆書本也林嘗謂漆書恐絶何幸有東海衛子宏得傳其學是宏所授本並是漆書與孔壁何與而欲其有閒坐字乎然明代儒生詬劉炫者多而詬朱呉者少何也此則有明一代俗學之通弊也明以八比取士專用朱氏所註書為取士功令立之學官人第知有朱氏而不知有孔子朱氏曾斥古文尚書為假書而呉澄又張大之有明俗儒無不攻古文而尊今文不幸而孝經古文與尚書古文同出孔壁又不幸而劉炫得孝經孔傳與梅賾上尚書孔傳又彼此相類因重以攻古文尚書之餘力并攻孝經其所以詬炫者正助熹澄之詬梅賾詬炫而加功焉者也敢詬熹澄哉然世雖未嘗詬之而有竊譏之者嘗見錢塘王草堂作二經彚刻一大學一孝經也孝經末篇載朱氏集中諸書痛言凡文之必不可改以為世戒并録于後朱氏與張南軒論二程遺書有云熹之愚意止是不欲輒改易前賢文字稍存謙退敬讓之心耳若聖賢成書稍有不惬已意處便率情奮筆恣行塗改恐此氣象亦自不佳葢所改雖盡善猶啟末流輕肆自大之弊况未必盡善乎老兄試思前聖入太廟每事問存餼羊謹闕文述而不作信而好古深戒不知而作教人多聞闕疑之心為如何而視今日紛更專輒之意象又為如何又云大抵古書有未安處隨事論著使人知之可矣若遽改之以沒其實則安知其果無未盡之意耶漢儒釋經有欲改易處但云某當作某後世猶或非之况遽改乎且非特漢儒而已孔子刪書血流漂杵之文因而不改孟子繼之亦曰吾于武成取二三䇿而已終不刋去此文以從已意之便也又云所謂不必改者按其舊文然後刋正所謂疑當作某一例之外未嘗敢妄以意更定一㸃畫也此其合于先生當日本文無疑今若有尊敬重正而不敢忽易之心則當一循其舊不容復有毫髪苟且遷就于其間乃為盡善又云區區非有偏主必勝之私但欲此集早成完書不悞後學耳計老兄之意豈異于此但恐見理太明故于文理瑣細之間不無濶略之處用心太剛故于一時意見所安必欲主張到底所以紛紛未能率定也又與南軒論改胡五峰語録云凡言刪改者亦且是私竊講貫議論以為當如是耳未可遽塗其本編也又與張南軒劉共父論二程遺書云此是二先生集胡文定當時亦只是據别本改録雖文定亦不能保其無一字之訛也今復得善本重加補綴乃是文定所樂聞文定復生亦無嫌間不知二兄何苦尚爾依違也又云如定性書及明道敘述上富公與謝帥書中刪却數十字及辭官表倒却次序易傳序改沿為泝祭文改姪為猶子之類皆非本文必是文定刪改熹看得此數處有無甚害者但亦可惜改却本文葢本文自不害義理故也今如此刪去不過是減得數十個閒字而壊却一個從容和樂底大體氣象又云程子嘗言人之為學其失在于自主張太過横渠猶戒以自處太重無復以来天下之善今觀二先生主張此事得無近此聖賢稽衆舎己兼聽並觀之意似不然也又云文定旣得以一時已見改易二程本文今人乃不得據相傳别本改正文定所改之未安處此何理耶又云但只是平氣虚心便當從之豈可肚裏先横却一個胡文定耶又與劉共父書云若説文定决然主張此書以為天下後世必當依此即與王介甫主張三經字説何異作是説者却是謗文定矣設使微似有此亦是克未盡底已私所謂賢者之過横渠所謂其不善者共改之正所望于後學不當守已殘而妬道真使其遺風餘弊波蕩于末流也王草堂曰予按朱氏所言深痛改竄古書之非理語語切中作聰明以亂舊章之病其于二程遺集不敢以已意更定一㸃畫不容復有毫髪遷就于其間五峰語録亦不敢遽塗其本編何其鄭重篤信至此而乃于孝經大學横加刪改豈先儒之書不可更改一字而聖賢之書可以連篇筆削乎其所云見理太明用心太剛者得毋自道乎據其所言則自處太重是亦克未盡底已私所謂賢者之過予之言此諒亦朱氏所樂聞但願讀是經者不可肚裏先横却一個朱氏也熊愚齋云學問之道是是非非毫釐不容差謬朱子之言可信則不當與之背馳不可信則背之可也誠大公無我之言哉而王恬曰草堂以此為微詞謂言不顧行非君子之道予則實有隱憂者宋人自矜所學直接堯舜互相標榜原有藐視先聖之意故于本朝先輩髙樹門庭不容一人訾議而先聖先賢恣情駁貶聖門諸賢何一不受其削斵而門庭前輩呵䕶悉力實有抑聖賢以揚同類之意宜乎俗儒入告請斥十賢于堂下而升周程張朱與四賢接席而恬不知怪也嗟乎恐將来四賢亦不安此席矣每讀六經未嘗不累息焉孝經問
