body:
  text: 孝經問孝經類提要臣等謹案孝經問一卷國朝毛奇齡撰奇齡有仲氏易已著録是編皆駁詰朱子孝經刋誤及呉澄孝經定本二書設為門人張燧問而奇齡答凡十條一曰孝經非偽書二曰今文古文無二本三曰劉炫無偽造孝經事四曰孝經分章所始五曰朱氏分各經傳無據六曰經不宜刪七曰孝經言孝不是效八曰朱氏呉氏刪經無優劣九曰閒居侍坐十曰朱氏極論改文之弊然其第十條乃論明人敢詬劉炫不敢詬朱呉附及朱子之尊二程過於孔子與所標之目不相應葢目為門人所加非奇齡所自定故或失其本旨也漢儒說經以師傳師所不言則一字不敢更宋儒說經以理斷理有可據則六經亦可改然守師傳者其弊不過失之拘憑理斷者其弊或至於横決而不可制王柏諸人點竄尚書刪削二南悍然欲出孔子上其所由來漸矣奇齡此書負氣叫囂誠不免失之過當而意主謹守舊文不欲啟變亂古經之習其持論則不能謂之不正也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:7e3a5717084f2c1dd8a01bcec48cc4048bbaa6c0e8f7450ca233531c1653455a
